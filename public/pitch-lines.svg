<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Pitch markings — clean white lines on transparent background -->
  <!-- Designed to be used as a watermark overlay at low opacity -->

  <!-- Outer boundary -->
  <rect x="20" y="20" width="760" height="460" stroke="white" stroke-width="2.5" fill="none" rx="2"/>

  <!-- Halfway line -->
  <line x1="400" y1="20" x2="400" y2="480" stroke="white" stroke-width="2.5"/>

  <!-- Center circle -->
  <circle cx="400" cy="250" r="73" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Center spot -->
  <circle cx="400" cy="250" r="4" fill="white"/>

  <!-- Left penalty area -->
  <rect x="20" y="158" width="120" height="184" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Left goal area -->
  <rect x="20" y="208" width="50" height="84" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Left penalty spot -->
  <circle cx="130" cy="250" r="3" fill="white"/>

  <!-- Left penalty arc -->
  <path d="M 140 203 A 73 73 0 0 1 140 297" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Right penalty area -->
  <rect x="660" y="158" width="120" height="184" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Right goal area -->
  <rect x="730" y="208" width="50" height="84" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Right penalty spot -->
  <circle cx="670" cy="250" r="3" fill="white"/>

  <!-- Right penalty arc -->
  <path d="M 660 203 A 73 73 0 0 0 660 297" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Corner arcs -->
  <path d="M 20 40 A 20 20 0 0 1 40 20" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M 760 40 A 20 20 0 0 0 740 20" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M 20 460 A 20 20 0 0 0 40 480" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M 760 460 A 20 20 0 0 1 740 480" stroke="white" stroke-width="2.5" fill="none"/>
</svg>
